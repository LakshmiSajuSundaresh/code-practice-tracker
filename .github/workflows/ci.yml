name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Run App Check
      run: |
        python app.py <<EOF
        3
        EOF

    - name: Build Docker Image
      run: docker build -t tracker .